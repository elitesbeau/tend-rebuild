/* ───── CHAT ───── */
function renderChat() {
  const session = TEND_DATA.sessions.find(s => s.id === state.sessionId) || TEND_DATA.sessions[0];
  const isOp = session.kind === "operations";
  const wrap = h("div", { class: "chat-page" + (isOp ? "" : " solo") });

  const chatPane = h("div", { class: "chat-pane" });
  chatPane.appendChild(h("div", { class: "chat-head" },
    h("div", { class: "session-meta" },
      h("div", { class: "session-title", text: session.title }),
      h("div", { class: "session-sub", text: session.sub }),
    ),
    h("div", { class: "flex gap-8" },
      h("span", { class: "pill " + (isOp ? "accent" : ""), text: isOp ? "OPERATIONS" : "GENERAL" }),
      h("button", {
        class: "btn-mini mono", text: "•••",
        onclick: () => toast({ t: "SESSION", m: "Mute · Rename · Archive (mock menu).", tone: "" }),
      }),
    ),
  ));

  const body = h("div", { class: "chat-body" });
  const msgs = allMessages(session);
  for (const m of msgs) {
    const msg = h("div", { class: "msg " + m.role });
    msg.appendChild(h("div", { class: "who", text: (m.role === "user" ? "You" : "Tend") + " · " + m.time }));
    const bub = h("div", { class: "bubble" });
    bub.innerHTML = inline(m.text);
    msg.appendChild(bub);
    body.appendChild(msg);
  }
  // typing indicator
  if (state.typingSession === session.id) {
    const typing = h("div", { class: "msg agent typing" });
    typing.appendChild(h("div", { class: "who", text: "Tend · thinking" }));
    typing.appendChild(h("div", { class: "bubble" },
      h("span", { class: "typing-dots" },
        h("span", {}), h("span", {}), h("span", {}),
      ),
    ));
    body.appendChild(typing);
  }
  chatPane.appendChild(body);

  const inputWrap = h("div", { class: "chat-input" });
  const ta = h("textarea", { placeholder: isOp ? `Continue ${session.title}… (Enter to send)` : "Ask Tend anything. Spawn a session with /op.", rows: "1" });
  const sendBtn = h("button", { class: "send", text: "SEND →" });
  inputWrap.appendChild(ta);
  inputWrap.appendChild(sendBtn);
  inputWrap.appendChild(h("span", { class: "hint", text: "Enter to send · Shift+Enter for newline" }));
  chatPane.appendChild(inputWrap);
  requestAnimationFrame(() => { wireChatInput(ta, sendBtn, session.id); ta.focus(); });

  wrap.appendChild(chatPane);

  if (isOp) {
    const divider = h("div", { class: "divider" });
    wrap.appendChild(divider);
    wrap.appendChild(renderSurface(session));
    requestAnimationFrame(() => enableHorizontalDrag(wrap, divider, "--chat-w", "--surface-w", null, (l, r) => {
      state.chatSplit = { chat: l, surface: r };
    }));
    if (state.chatSplit && state.chatSplit.chat != null) {
      wrap.style.setProperty("--chat-w", state.chatSplit.chat + "px");
      wrap.style.setProperty("--surface-w", state.chatSplit.surface + "px");
    }
  }

  requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
  return wrap;
}

function renderSurface(session) {
  const surface = h("div", { class: "surface" });
  const tabs = session.surfaces || [];
  const tabIdx = Math.min(state.surfaceTab, tabs.length - 1);
  const active = tabs[tabIdx];

  const tabBar = h("div", { class: "surface-head" });
  const tabRow = h("div", { class: "surface-tabs" });
  tabs.forEach((t, i) => {
    const tab = h("button", {
      class: "surface-tab" + (i === tabIdx ? " active" : ""),
      onclick: () => go({ surfaceTab: i }),
    }, h("span", { text: t.label }));
    if (t.count) tab.appendChild(h("span", { class: "tab-count mono", text: String(t.count) }));
    tabRow.appendChild(tab);
  });
  tabRow.appendChild(h("button", {
    class: "surface-tab", title: "New tab",
    onclick: () => {
      const name = prompt("Name for the new tab?");
      if (!name) return;
      session.surfaces = session.surfaces || [];
      session.surfaces.push({ id: name.toLowerCase().replace(/\W+/g, "-"), label: name, count: 0, metaStrip: { num: "§" + String(session.surfaces.length + 1).padStart(2, "0"), name: name.toUpperCase(), desc: "newly added · empty" }, blocks: [] });
      state.surfaceTab = session.surfaces.length - 1;
      toast({ t: "TAB ADDED", m: `"${name}" tab is empty — ask Tend to fill it.`, tone: "pos" });
      render();
    },
    text: "+",
  }));
  tabBar.appendChild(tabRow);
  tabBar.appendChild(h("div", { class: "right" },
    h("button", { class: "btn-mini mono", text: "EXPORT", onclick: () => toast({ t: "EXPORT", m: "Surface exported to clipboard (mock).", tone: "pos" }) }),
    h("button", { class: "btn-mini mono", text: "⤢", title: "Expand", onclick: () => toast({ t: "EXPAND", m: "Full-screen surface (mock).", tone: "" }) }),
  ));
  surface.appendChild(tabBar);

  const body = h("div", { class: "surface-body" });
  if (active && active.metaStrip) body.appendChild(metaStrip(active.metaStrip));
  if (active && active.blocks) {
    for (const block of active.blocks) body.appendChild(renderBlock(block));
  } else {
    body.appendChild(h("div", { class: "dim mono", text: "Empty surface. Ask Tend to do something." }));
  }
  surface.appendChild(body);

  // live sync footer
  const now = new Date();
  const stamp = now.toTimeString().slice(0, 8);
  surface.appendChild(h("div", { class: "surface-foot" },
    h("span", { text: "FIG. " + String(tabIdx + 1).padStart(2, "0") + " / OPERATING SURFACE / " + (active ? active.label.toUpperCase() : "") }),
    h("span", { class: "sync" },
      h("span", { class: "dot" }),
      h("span", { text: "SYNCED " + stamp }),
    ),
  ));

  return surface;
}

function metaStrip({ num, name, desc }) {
  return h("div", { class: "meta surface-meta" },
    h("strong", { text: num }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: name }),
    h("span", { class: "sep", text: "/" }),
    h("span", { text: desc }),
  );
}

/* ────────────────────────────────────────
   BLOCK RENDERERS
   ──────────────────────────────────────── */
function renderBlock(block) {
  switch (block.type) {
    case "doc": return docBlock(block);
    case "kpi": return kpiBlock(block);
    case "spec": return specBlock(block);
    case "matrix": return matrixBlock(block);
    case "table": return tableBlock(block);
    case "code": return codeBlock(block);
    case "approval": return approvalBlock(block);
    case "approvals-inbox": return approvalsInboxBlock(block);
    case "outputs-feed": return outputsFeedBlock(block);
    case "checklist": return checklistBlock(block);
    default: return h("div", { class: "muted", text: "[unknown block: " + block.type + "]" });
  }
}

function blockHead(head) {
  if (!head) return null;
  return h("div", { class: "block-head" },
    h("h3", { text: head.title }),
    head.kicker ? h("div", { class: "kicker", text: head.kicker }) : null,
  );
}

function docBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  const body = h("div", { class: "block-doc" });
  body.innerHTML = md(b.body || "");
  w.appendChild(body);
  return w;
}

function kpiBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  const grid = h("div", { class: "block-kpi", style: { "--kpi-cols": String(b.cols || b.items.length) } });
  for (const it of b.items) {
    grid.appendChild(h("div", { class: "cell" },
      h("div", { class: "k", text: it.k }),
      h("div", { class: "v", html: esc(it.v) }),
      it.delta ? h("div", { class: "delta " + (it.deltaTone || ""), text: it.delta }) : null,
    ));
  }
  w.appendChild(grid);
  return w;
}

function specBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  const grid = h("div", { class: "block-spec", style: { "--spec-cols": String(b.cols || b.cells.length) } });
  for (const c of b.cells) {
    grid.appendChild(h("div", { class: "cell" },
      h("div", { class: "k", text: c.k }),
      h("div", { class: "v", text: c.v }),
    ));
  }
  w.appendChild(grid);
  return w;
}

function matrixBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  const grid = h("div", {
    class: "block-matrix cols-" + (b.cols || 3),
    style: { "--matrix-cols": String(b.cols || 3) },
  });
  for (const it of b.items) {
    const cell = h("div", { class: "cell" });
    cell.appendChild(h("div", { class: "num", text: it.num }));
    cell.appendChild(h("h4", { text: it.title }));
    cell.appendChild(h("p", { text: it.body }));
    if (it.foot || it.footStrong) cell.appendChild(h("div", { class: "foot" },
      it.footStrong ? h("span", { class: "foot-label", text: it.footStrong }) : null,
      it.foot ? h("span", { class: "foot-time", text: it.foot }) : null,
    ));
    grid.appendChild(cell);
  }
  w.appendChild(grid);
  return w;
}

function tableBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  const table = h("table", { class: "block-table" });
  const thead = h("thead");
  const trh = h("tr");
  for (const c of b.table.cols) trh.appendChild(h("th", { text: c }));
  thead.appendChild(trh);
  table.appendChild(thead);
  const tbody = h("tbody");
  for (const row of b.table.rows) {
    const tr = h("tr");
    for (const cell of row) tr.appendChild(h("td", { text: cell }));
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  w.appendChild(table);
  return w;
}

function codeBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  w.appendChild(h("pre", { class: "block-code", text: b.code }));
  return w;
}

function approvalBlock(b) {
  const key = (b.label || "") + "::" + (b.title || "");
  const resolved = state.resolvedApprovals.has(key);
  const w = h("div", { class: "block block-approval" + (resolved ? " resolved" : "") });
  w.appendChild(h("div", { class: "head" },
    h("div", { class: "label", text: b.label || "DECISION" }),
    h("span", { class: "pill warn", text: resolved ? "RESOLVED" : "WAITING" }),
  ));
  w.appendChild(h("h4", { text: b.title }));
  w.appendChild(h("p", { text: b.body }));
  const actions = h("div", { class: "actions" });
  (b.actions || []).forEach((a, i) => {
    const txt = a.toLowerCase();
    const cls = i === 0 ? "btn primary" : (txt.includes("hold") || txt.includes("reject") ? "btn reject" : "btn ghost");
    actions.appendChild(h("button", {
      class: cls, text: a,
      onclick: () => resolveApproval(key, a),
    }));
  });
  w.appendChild(actions);
  return w;
}

function checklistBlock(b) {
  const w = h("div", { class: "block" });
  if (b.head) w.appendChild(blockHead(b.head));
  const list = h("div", { class: "block-checklist" });
  for (const it of b.items) {
    list.appendChild(h("div", { class: "item" + (it.done ? " done" : "") },
      h("span", { class: "check" }),
      h("span", { class: "label", text: it.label }),
      it.meta ? h("span", { class: "meta", text: it.meta }) : null,
    ));
  }
  w.appendChild(list);
  return w;
}

function approvalsInboxBlock(b) {
  const queue = (TEND_DATA.approvalsQueue || []).filter(a => !state.dismissedApprovals.has(a.id));
  const wrap = h("div", { class: "block block-approvals-summary" });
  wrap.appendChild(h("div", { class: "block-head" },
    h("h3", { text: b.title || "Approvals" }),
    h("button", {
      class: "kicker link",
      onclick: () => go({ page: "automations", autoTab: "approvals" }),
      text: queue.length + " PENDING →",
    }),
  ));
  const list = h("div", { class: "approvals-summary-list" });
  if (queue.length === 0) {
    list.appendChild(h("div", { style: { padding: "24px 18px", color: "var(--fg-mute)", fontFamily: "var(--mono)", fontSize: "11px", letterSpacing: "0.06em", textAlign: "center" }, text: "INBOX ZERO" }));
  }
  for (const a of queue.slice(0, 3)) {
    const row = h("button", {
      class: "as-row prio-" + (a.priority || "normal"),
      "data-id": a.id,
      onclick: () => go({ page: "automations", autoTab: "approvals" }),
    });
    row.appendChild(h("div", { class: "as-title", text: a.title }));
    row.appendChild(h("div", { class: "as-meta" },
      h("span", { class: "from", text: a.from }),
      h("span", { class: "sep", text: "·" }),
      h("span", { class: "since", text: a.waitingSince }),
    ));
    list.appendChild(row);
  }
  wrap.appendChild(list);
  if (queue.length > 3) {
    wrap.appendChild(h("button", {
      class: "summary-more",
      onclick: () => go({ page: "automations", autoTab: "approvals" }),
      text: "+ " + (queue.length - 3) + " more in queue →",
    }));
  }
  return wrap;
}

function outputsFeedBlock(b) {
  const wrap = h("div", { class: "block block-outputs-feed" });
  wrap.appendChild(h("div", { class: "block-head" },
    h("h3", { text: b.title || "Recent landings" }),
    h("div", { class: "kicker", text: "→ ALL OUTPUTS" }),
  ));
  const list = h("div", { class: "outputs-list" });
  for (const o of (TEND_DATA.automationOutputs || []).slice(0, 6)) {
    const row = h("div", { class: "output-row kind-" + (o.kind || "") });
    row.appendChild(h("span", { class: "or-when", text: o.when }));
    row.appendChild(h("span", { class: "or-from", text: o.from }));
    row.appendChild(h("span", { class: "or-what", text: o.what }));
    row.appendChild(h("span", { class: "or-where", text: "→ " + o.where }));
    list.appendChild(row);
  }
  wrap.appendChild(list);
  return wrap;
}

/* ───── DATA LAYER ───── */
function renderData() {
  const wrap = h("div", { class: "data-page" });

  const bar = h("div", { class: "connectors-bar" });
  bar.appendChild(h("div", { class: "label", text: "CONNECTORS" }));
  for (const c of TEND_DATA.connectors) {
    const st = state.connectorStates[c.id] || c.state;
    bar.appendChild(h("button", {
      class: "connector-chip " + (st === "off" ? "off" : "on"),
      onclick: () => toggleConnector(c.id),
      title: "Click to " + (st === "on" ? "disable" : "enable"),
    },
      h("span", { class: "status-dot" }),
      h("span", { text: c.label }),
    ));
  }
  bar.appendChild(h("button", {
    class: "connector-chip add",
    onclick: () => {
      const name = prompt("Connector name?");
      if (!name) return;
      const id = name.toLowerCase().replace(/\W+/g, "-");
      TEND_DATA.connectors.push({ id, label: name, state: "on" });
      state.connectorStates[id] = "on";
      toast({ t: "CONNECTOR ADDED", m: `${name} connected. Tend will scan it on next sync.`, tone: "pos" });
      render();
    },
  }, h("span", { text: "+ ADD" })));
  wrap.appendChild(bar);

  const body = h("div", { class: "data-body" });

  // librarian chat pane
  const chatPane = h("div", { class: "chat-pane" });
  chatPane.appendChild(h("div", { class: "chat-head" },
    h("div", { class: "session-meta" },
      h("div", { class: "session-title", text: "Data librarian" }),
      h("div", { class: "session-sub", text: "edits go through me · approvals on for writes" }),
    ),
  ));
  const cbody = h("div", { class: "chat-body" });
  const dataMessages = [
    { role: "agent", time: "Wed 11:42", text: "I noticed your `vendors.md` still has the FlyLens entry from 2024. They've been out of business since fall. Want me to remove it and replace with the drone vendor decision once Q2 sourcing closes?" },
    { role: "user", time: "Wed 11:43", text: "Yes. Hold the replace until I approve Skybridge." },
    { role: "agent", time: "Wed 11:43", text: "Got it. Logged a pending edit on vendors.md — will execute once the Q2 vendor session reaches a decision." },
    { role: "agent", time: "today 7:02", text: "Coverage on `competitors.md` is at 55% — I'd like to refresh by scanning Mueller & Co. and Threshold's recent listings. Approve a 1-time scan?" },
  ];
  for (const m of dataMessages) {
    const msg = h("div", { class: "msg " + m.role });
    msg.appendChild(h("div", { class: "who", text: (m.role === "user" ? "You" : "Librarian") + " · " + m.time }));
    const bub = h("div", { class: "bubble" });
    bub.innerHTML = inline(m.text);
    msg.appendChild(bub);
    cbody.appendChild(msg);
  }
  chatPane.appendChild(cbody);
  const dInputWrap = h("div", { class: "chat-input" });
  const dTa = h("textarea", { placeholder: "Ask the librarian (Enter to send)", rows: "1" });
  const dSend = h("button", { class: "send", text: "SEND →" });
  dInputWrap.appendChild(dTa);
  dInputWrap.appendChild(dSend);
  chatPane.appendChild(dInputWrap);
  requestAnimationFrame(() => {
    const fire = () => {
      const v = dTa.value.trim();
      dTa.value = "";
      if (!v) return;
      cbody.appendChild(h("div", { class: "msg user" },
        h("div", { class: "who", text: "You · " + nowStamp() }),
        h("div", { class: "bubble", text: v }),
      ));
      cbody.scrollTop = cbody.scrollHeight;
      // typing
      const typ = h("div", { class: "msg agent typing" },
        h("div", { class: "who", text: "Librarian · thinking" }),
        h("div", { class: "bubble" },
          h("span", { class: "typing-dots" }, h("span", {}), h("span", {}), h("span", {})),
        ),
      );
      cbody.appendChild(typ);
      cbody.scrollTop = cbody.scrollHeight;
      setTimeout(() => {
        typ.remove();
        cbody.appendChild(h("div", { class: "msg agent" },
          h("div", { class: "who", text: "Librarian · " + nowStamp() }),
          h("div", { class: "bubble", text: "Logged. I'll surface a pending edit on the relevant file and hold for your approval before writing." }),
        ));
        cbody.scrollTop = cbody.scrollHeight;
        toast({ t: "LIBRARIAN", m: "Pending edit logged — held for approval.", tone: "warn" });
      }, 800);
    };
    dTa.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); fire(); } });
    dSend.addEventListener("click", fire);
  });
  body.appendChild(chatPane);

  const divider = h("div", { class: "divider" });
  body.appendChild(divider);

  // MD pane
  const mdPane = h("div", { class: "data-md" });
  const mdHead = h("div", { class: "data-md-head" });
  const tabs = h("div", { class: "data-md-tabs" });
  for (const [name] of Object.entries(TEND_DATA.dataLayer)) {
    const tabBtn = h("button", {
      class: "md-tab" + (state.dataFile === name ? " active" : ""),
      onclick: () => go({ dataFile: name }),
      text: name,
    });
    if (state.dirtyFiles.has(name)) tabBtn.appendChild(h("span", { class: "dirty", title: "Recently edited" }));
    tabs.appendChild(tabBtn);
  }
  mdHead.appendChild(tabs);
  const isEditing = state.editingFile === state.dataFile;
  if (isEditing) {
    mdHead.appendChild(h("div", { class: "flex gap-8" },
      h("button", { class: "btn-mini mono primary", text: "SAVE", onclick: saveEditFile }),
      h("button", { class: "btn-mini mono ghost", text: "CANCEL", onclick: cancelEditFile }),
    ));
  } else {
    mdHead.appendChild(h("div", { class: "flex gap-8" },
      h("button", { class: "btn-mini mono", text: "EDIT", onclick: startEditFile }),
      h("button", { class: "btn-mini mono", text: "EXPORT ZIP", onclick: () => toast({ t: "EXPORT", m: "Your 7-file data layer zipped to clipboard (mock).", tone: "pos" }) }),
    ));
  }
  mdPane.appendChild(mdHead);

  const file = TEND_DATA.dataLayer[state.dataFile];
  const mdBody = h("div", { class: "data-md-body" });
  mdBody.appendChild(h("div", { class: "file-meta" },
    h("span", {}, document.createTextNode("FILE · "), h("strong", { text: state.dataFile })),
    h("span", { text: "UPDATED · " + file.updated }),
    h("span", { text: "COVERAGE · " + Math.round(file.coverage * 100) + "%" }),
    isEditing ? h("span", { style: { color: "var(--accent)" }, text: "· EDITING" }) : null,
  ));
  if (isEditing) {
    const ed = h("textarea", { class: "md-editor", spellcheck: "false" });
    ed.value = state.fileBuffer[state.dataFile] ?? file.content;
    ed.addEventListener("input", () => { state.fileBuffer[state.dataFile] = ed.value; });
    mdBody.appendChild(ed);
    requestAnimationFrame(() => ed.focus());
  } else {
    const docDiv = h("div", { class: "block-doc" });
    docDiv.innerHTML = md(file.content);
    mdBody.appendChild(docDiv);
  }
  mdPane.appendChild(mdBody);
  body.appendChild(mdPane);

  wrap.appendChild(body);

  if (state.dataSplit != null) body.style.setProperty("--data-chat-w", state.dataSplit + "px");
  requestAnimationFrame(() => enableHorizontalDrag(body, divider, "--data-chat-w", null, 380, l => {
    state.dataSplit = l;
  }));

  return wrap;
}

/* ───── AUTOMATIONS ───── */
function renderAutomations() {
  const wrap = h("div", { class: "automations-page" });

  if (state.automationDetail) return renderAutomationDetail(wrap);

  const queueCount = TEND_DATA.approvalsQueue.filter(a => !state.dismissedApprovals.has(a.id)).length;
  const outputCount = TEND_DATA.automationOutputs.length;

  wrap.appendChild(h("div", { class: "meta meta-strip" },
    h("strong", { text: "§ AUTOMATIONS" }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: TEND_DATA.automations.length + " ACTIVE" }),
    h("span", { class: "sep", text: "/" }),
    h("span", { text: queueCount + " gated · " + outputCount + " recent outputs" }),
  ));

  const title = h("h2", { class: "section-title" });
  title.innerHTML = 'Your jobs, <span class="serif">on rails.</span>';
  wrap.appendChild(title);
  wrap.appendChild(h("p", { class: "section-sub", text: "Every automation is a sequence of steps Tend runs for you. Outputs land somewhere you can see. Approval gates pause for your call." }));

  const tabBar = h("div", { class: "auto-tabs" });
  const tabs = [
    { id: "jobs", label: "JOBS", count: TEND_DATA.automations.length },
    { id: "approvals", label: "APPROVALS", count: queueCount, tone: queueCount ? "warn" : "" },
    { id: "outputs", label: "OUTPUT LOG", count: outputCount },
  ];
  for (const t of tabs) {
    const btn = h("button", {
      class: "auto-tab" + (state.autoTab === t.id ? " active" : "") + (t.tone ? " tone-" + t.tone : ""),
      onclick: () => go({ autoTab: t.id }),
    },
      h("span", { class: "lbl", text: t.label }),
      h("span", { class: "cnt", text: String(t.count) }),
    );
    tabBar.appendChild(btn);
  }
  wrap.appendChild(tabBar);

  const body = h("div", { class: "auto-page-body" });
  const left = h("div", { class: "auto-left" });

  if (state.autoTab === "approvals") {
    left.appendChild(renderApprovalsInboxFull());
  } else if (state.autoTab === "outputs") {
    left.appendChild(renderOutputsLogFull());
  } else {
    const list = h("div", { class: "auto-list" });
    for (const a of TEND_DATA.automations) {
      const isPaused = state.pausedAutomations.has(a.id);
      const justRan = state.runFlash === a.id;
      const row = h("button", {
        class: "auto-row" + (isPaused ? " paused" : "") + (justRan ? " just-ran" : ""),
        onclick: () => go({ automationDetail: a.id }),
      });
      row.appendChild(h("div", { class: "name" },
        h("div", { class: "t", text: a.name }),
        h("div", { class: "d", text: a.desc }),
      ));
      row.appendChild(h("div", { class: "schedule" },
        h("span", { class: "k", text: "Schedule" }),
        document.createTextNode(a.schedule),
      ));
      row.appendChild(h("div", { class: "output" },
        h("span", { class: "k", text: "Produces" }),
        h("div", { class: "v", text: a.produces || "—" }),
        h("div", { class: "where", text: a.output ? "→ " + a.output.lands : "" }),
      ));
      row.appendChild(h("div", { class: "next" },
        h("span", { class: "k", text: "Next" }),
        document.createTextNode(isPaused ? "PAUSED" : a.next),
      ));
      row.appendChild(h("span", { class: "pill " + (isPaused ? "" : a.approvals ? "warn" : "pos"), text: isPaused ? "PAUSED" : a.approvals ? "GATED" : "AUTO" }));
      list.appendChild(row);
    }
    left.appendChild(list);
    left.appendChild(h("button", {
      class: "auto-new",
      onclick: () => {
        const ta = document.querySelector(".keeper-input textarea");
        if (ta) { ta.value = "Spawn a new automation that…"; ta.focus(); }
        toast({ t: "KEEPER", m: "Tell the Keeper what to spawn — schedule, output, gate.", tone: "" });
      },
    },
      h("span", { class: "plus", text: "+" }),
      h("span", { text: "New automation · ask the Keeper" }),
    ));
  }

  body.appendChild(left);
  body.appendChild(renderKeeperPanel(null));
  wrap.appendChild(body);
  return wrap;
}

function renderApprovalsInboxFull() {
  const wrap = h("div", { class: "approvals-inbox-full" });
  const queue = TEND_DATA.approvalsQueue.filter(a => !state.dismissedApprovals.has(a.id));
  if (!queue.length) {
    wrap.appendChild(h("div", { class: "empty", text: "Inbox zero. Tend has nothing waiting on you." }));
    return wrap;
  }
  for (const a of queue) {
    const row = h("div", { class: "approval-row prio-" + (a.priority || "normal"), "data-id": a.id });
    row.appendChild(h("div", { class: "ar-meta" },
      h("span", { class: "from", text: a.from }),
      h("span", { class: "since", text: a.waitingSince + " ago" }),
    ));
    row.appendChild(h("div", { class: "ar-title", text: a.title }));
    row.appendChild(h("div", { class: "ar-preview", text: a.preview }));
    row.appendChild(h("div", { class: "ar-actions" },
      h("span", { class: "ar-channel", text: a.channel }),
      h("button", { class: "btn-mini ghost", text: "HOLD", onclick: () => approveItem(a.id, "hold") }),
      h("button", { class: "btn-mini ghost", text: "REJECT", onclick: () => approveItem(a.id, "reject") }),
      h("button", { class: "btn-mini primary", text: "APPROVE →", onclick: () => approveItem(a.id, "approve") }),
    ));
    wrap.appendChild(row);
  }
  return wrap;
}

function renderOutputsLogFull() {
  const wrap = h("div", { class: "outputs-log-full" });
  const outs = TEND_DATA.automationOutputs;
  if (!outs.length) {
    wrap.appendChild(h("div", { class: "empty", text: "No automation outputs yet." }));
    return wrap;
  }
  for (const o of outs) {
    const row = h("div", { class: "output-row kind-" + (o.kind || "") });
    row.appendChild(h("span", { class: "or-when", text: o.when }));
    row.appendChild(h("span", { class: "or-from", text: o.from }));
    row.appendChild(h("span", { class: "or-what", text: o.what }));
    row.appendChild(h("span", { class: "or-where", text: "→ " + o.where }));
    wrap.appendChild(row);
  }
  return wrap;
}

function renderKeeperPanel(automation) {
  const panel = h("aside", { class: "keeper-panel" });
  panel.appendChild(h("div", { class: "meta" },
    h("strong", { text: "§ KEEPER" }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: "AUTOMATION SUB-AGENT" }),
  ));
  panel.appendChild(h("div", { class: "keeper-title", text: automation ? "Editing: " + automation.name : "Automation Keeper" }));
  panel.appendChild(h("p", { class: "keeper-sub", text: automation
    ? "Tell me what to change about this one. Schedule, recipients, voice, gates, output destination — all editable in plain English."
    : "I run your automations. Ask me to spawn a new one, change a schedule, tweak voice, pause a job, or change where output lands." }));

  const suggest = h("div", { class: "keeper-suggest" });
  const suggestions = automation ? [
    "Move this to weekly instead of monthly",
    "Skip the approval gate for 5★ replies",
    "Also CC my assistant on these sends",
    "Pause until I tell you otherwise",
  ] : [
    "Spawn a quarterly check-in for past clients",
    "Add a Tuesday vendor-status digest",
    "Watch for new MLS listings in Mueller",
    "Pause everything until Monday",
  ];
  for (const s of suggestions) {
    const chip = h("button", { class: "keeper-chip", text: s });
    chip.addEventListener("click", () => keeperChipClick(s, chip));
    suggest.appendChild(chip);
  }
  panel.appendChild(suggest);

  const chat = h("div", { class: "keeper-chat" });
  chat.appendChild(h("div", { class: "k-msg" },
    h("div", { class: "k-from", text: "Keeper" }),
    h("div", { class: "k-bubble", text: automation
      ? "Reading the spec for " + automation.name + ". Last run: " + automation.last + ". " + (automation.recentRuns?.length || 0) + " runs in history. What do you want to change?"
      : TEND_DATA.automations.length + " automations running. " + (TEND_DATA.approvalsQueue.filter(a => !state.dismissedApprovals.has(a.id)).length) + " items in your approvals queue. What do you need?" }),
  ));
  panel.appendChild(chat);

  const kInputWrap = h("div", { class: "keeper-input" });
  const kTa = h("textarea", { rows: "1", placeholder: automation ? "Change anything about " + automation.name + "…" : "Ask the Keeper anything…" });
  const kSend = h("button", { class: "send-mini", text: "→" });
  kInputWrap.appendChild(kTa);
  kInputWrap.appendChild(kSend);
  panel.appendChild(kInputWrap);
  requestAnimationFrame(() => wireKeeperInput(kTa, kSend));

  return panel;
}

function renderAutomationDetail(wrap) {
  const a = TEND_DATA.automations.find(x => x.id === state.automationDetail);
  if (!a) { state.automationDetail = null; return renderAutomations(); }

  wrap.appendChild(h("div", { class: "meta meta-strip" },
    h("button", { class: "btn-mini mono", onclick: () => go({ automationDetail: null }), text: "← BACK" }),
    h("strong", { text: "§ AUTOMATION" }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: a.name.toUpperCase() }),
    h("span", { class: "sep", text: "/" }),
    h("span", { text: a.desc }),
  ));

  const body = h("div", { class: "auto-page-body" });
  const left = h("div", { class: "auto-left" });

  left.appendChild(h("h2", { class: "section-title", text: a.name, style: { marginTop: "16px" } }));
  left.appendChild(h("p", { class: "section-sub", text: a.desc }));

  // schedule strip
  const spec = h("div", { class: "block-spec", style: { "--spec-cols": "4", marginBottom: "20px" } });
  [
    { k: "Schedule", v: a.schedule, edit: true },
    { k: "Last run", v: a.last, edit: false },
    { k: "Next run", v: a.next, edit: false },
    { k: "Status", v: a.status, edit: false },
  ].forEach(c => {
    const cell = h("div", { class: "cell" + (c.edit ? " is-edit" : "") },
      h("div", { class: "k", text: c.k }),
      h("div", { class: "v", text: c.v }),
    );
    if (c.edit) cell.appendChild(h("span", { class: "pencil", text: "✎" }));
    spec.appendChild(cell);
  });
  left.appendChild(spec);

  // Output
  if (a.produces || a.output) {
    left.appendChild(h("div", { class: "meta", style: { marginTop: "28px" } },
      h("strong", { text: "§ OUTPUT" }),
      h("span", { class: "sep", text: "/" }),
      h("em", { text: "WHAT IT PRODUCES · WHERE IT LANDS" }),
    ));
    const outBlock = h("div", { class: "block-output" });
    outBlock.appendChild(h("div", { class: "produces" },
      h("div", { class: "lbl", text: "Produces" }),
      h("div", { class: "val", text: a.produces || "—" }),
    ));
    if (a.output) {
      const grid = h("div", { class: "output-spec" });
      [
        { k: "Channel", v: a.output.via },
        { k: "Lands at", v: a.output.lands },
        { k: "Kind", v: a.output.kind },
        { k: "Volume", v: a.output.volume },
      ].forEach(c => grid.appendChild(h("div", {},
        h("div", { class: "k", text: c.k }),
        h("div", { class: "v", text: c.v }),
      )));
      outBlock.appendChild(grid);
    }
    left.appendChild(outBlock);
  }

  // Sequence
  left.appendChild(h("div", { class: "meta", style: { marginTop: "28px" } },
    h("strong", { text: "§ SEQUENCE" }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: a.sequence.length + " STEPS" }),
  ));
  const seq = h("div", { class: "seq-map", style: { gridTemplateColumns: `repeat(${a.sequence.length}, 1fr)` } });
  for (const st of a.sequence) {
    seq.appendChild(h("div", { class: "seq-step" + (st.gate ? " gate" : "") },
      h("div", { class: "n", text: st.n + (st.gate ? " · GATE" : "") }),
      h("div", { class: "t", text: st.t }),
      h("div", { class: "sub", text: st.sub }),
    ));
  }
  left.appendChild(seq);

  // Recent runs
  if (a.recentRuns?.length) {
    left.appendChild(h("div", { class: "meta", style: { marginTop: "28px" } },
      h("strong", { text: "§ RUN HISTORY" }),
      h("span", { class: "sep", text: "/" }),
      h("em", { text: "LAST " + a.recentRuns.length + " RUNS" }),
    ));
    const tbl = h("table", { class: "block-table", style: { marginTop: "12px" } });
    const thead = h("thead");
    thead.appendChild(h("tr", {},
      h("th", { text: "When" }), h("th", { text: "Outcome" }),
      h("th", { text: "Artifact" }), h("th", { text: "Status" }),
    ));
    tbl.appendChild(thead);
    const tbody = h("tbody");
    for (const r of a.recentRuns) {
      tbody.appendChild(h("tr", {},
        h("td", { text: r.when }),
        h("td", { text: r.outcome }),
        h("td", {}, r.artifact ? h("span", { class: "mono", style: { fontSize: "11px", color: "var(--fg-mute)" }, text: r.artifact }) : document.createTextNode("—")),
        h("td", {}, h("span", {
          class: "pill " + (r.status === "complete" ? "pos" : r.status === "awaiting" ? "warn" : r.status === "held" ? "danger" : ""),
          text: r.status.toUpperCase(),
        })),
      ));
    }
    tbl.appendChild(tbody);
    left.appendChild(tbl);
  }

  // actions
  const isPaused = state.pausedAutomations.has(a.id);
  left.appendChild(h("div", { class: "flex gap-8", style: { marginTop: "28px", flexWrap: "wrap" } },
    h("button", { class: "btn primary", text: "RUN NOW", onclick: () => runAutomationNow(a.id) }),
    h("button", {
      class: "btn ghost", text: "EDIT IN KEEPER →",
      onclick: () => {
        const ta = document.querySelector(".keeper-input textarea");
        if (ta) { ta.value = "Change "; ta.focus(); }
        toast({ t: "KEEPER", m: "Tell the Keeper what to change.", tone: "" });
      },
    }),
    h("button", {
      class: "btn ghost", text: isPaused ? "RESUME" : "PAUSE",
      onclick: () => togglePauseAutomation(a.id),
    }),
  ));

  body.appendChild(left);
  body.appendChild(renderKeeperPanel(a));
  wrap.appendChild(body);
  return wrap;
}

/* ───── DASHBOARD ───── */
function renderDashboard() {
  const wrap = h("div", { class: "dashboard-page" });

  wrap.appendChild(h("div", { class: "meta meta-strip" },
    h("strong", { text: "§ DASHBOARD" }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: (state.viewingDay || TEND_DATA.tenant.today.toUpperCase()) }),
    h("span", { class: "sep", text: "/" }),
    h("span", { text: state.viewingDay ? "historical snapshot · read-only" : "your daily orientation" }),
  ));

  if (state.viewingDay) {
    wrap.appendChild(h("div", { class: "viewing-past" },
      h("span", { text: "VIEWING SNAPSHOT FROM " + state.viewingDay + " · read-only" }),
      h("button", { class: "x", text: "RETURN TO TODAY", onclick: () => { state.viewingDay = null; render(); } }),
    ));
  }

  const focusTake = (() => {
    const f = state.greetingFocus;
    if (!f) return 'Here\'s your day.';
    if (f === "listings") return 'Listings are the focus.';
    if (f === "clients") return 'Past clients are the focus.';
    if (f === "field") return 'You\'re in the field.';
    if (f === "admin") return 'Admin and ops only.';
    return 'Here\'s your day.';
  })();
  const title = h("h2", { class: "section-title" });
  title.innerHTML = 'Good morning, Sarah. <span class="serif">' + focusTake + '</span>';
  wrap.appendChild(title);
  wrap.appendChild(h("p", { class: "section-sub", text: "Snapshot rebuilt at 8:14 AM. Click any session below to jump into the room." }));

  // live patch: approvals count reflects state
  const liveBlocks = JSON.parse(JSON.stringify(TEND_DATA.dashboardBlocks));
  const liveApprovals = TEND_DATA.approvalsQueue.filter(a => !state.dismissedApprovals.has(a.id)).length;
  const kpiBlk = liveBlocks.find(b => b.type === "kpi");
  if (kpiBlk) {
    const ap = kpiBlk.items.find(x => /approval/i.test(x.k));
    if (ap) ap.v = String(liveApprovals);
    const runs = kpiBlk.items.find(x => /runs this week/i.test(x.k));
    if (runs && state.recentRuns.length) runs.v = String(8 + state.recentRuns.length);
  }
  // live patch: run history adds user runs
  const histBlk = liveBlocks.find(b => b.type === "table" && b.kicker && b.kicker.includes("§06"));
  if (histBlk && state.recentRuns.length) {
    histBlk.table.rows = state.recentRuns.map(r => [r.when, "Manual run", r.outcome, r.status === "complete" ? "Complete" : "Awaiting"]).concat(histBlk.table.rows).slice(0, 6);
  }
  const grid = h("div", { class: "dash-grid" });
  for (const b of liveBlocks) {
    const block = renderBlock(b);
    block.classList.add("dash-w-" + (b.width || 12));
    if (b.kicker || b.title) {
      const meta = h("div", { class: "meta", style: { marginBottom: "12px" } },
        h("strong", { text: b.kicker || "" }),
        h("span", { class: "sep", text: "/" }),
        h("em", { text: (b.title || "").toUpperCase() }),
      );
      block.insertBefore(meta, block.firstChild);
    }
    grid.appendChild(block);
  }
  wrap.appendChild(grid);

  const verBox = h("div", { class: "versions" });
  ["MAY 14", "MAY 15", "MAY 16", "MAY 17"].forEach(d => {
    const isCurrent = state.viewingDay ? d === state.viewingDay : d === "MAY 17";
    verBox.appendChild(h("button", {
      class: "v" + (isCurrent ? " current" : ""),
      text: d,
      onclick: () => viewHistoryDay(d),
    }));
  });
  wrap.appendChild(h("div", { class: "history-strip" },
    h("span", { text: "DAILY SNAPSHOT · HISTORY" }),
    verBox,
  ));

  return wrap;
}

/* ───── ACCOUNT ───── */
function renderAccount() {
  const wrap = h("div", { class: "account-page" });
  wrap.appendChild(h("div", { class: "meta meta-strip" },
    h("strong", { text: "§ ACCOUNT" }),
    h("span", { class: "sep", text: "/" }),
    h("em", { text: TEND_DATA.tenant.workspaceName.toUpperCase() }),
    h("span", { class: "sep", text: "/" }),
    h("span", { text: "billing · usage · workspace" }),
  ));

  wrap.appendChild(h("h2", { text: "Workspace & plan." }));

  const identity = h("div", { class: "block-spec", style: { "--spec-cols": "3", marginBottom: "24px" } });
  [
    { k: "Workspace", v: TEND_DATA.tenant.workspaceName },
    { k: "Owner", v: TEND_DATA.tenant.owner.name + " · " + TEND_DATA.tenant.owner.email },
    { k: "License", v: "TX BR# 9-748202" },
  ].forEach(c => identity.appendChild(h("div", { class: "cell" },
    h("div", { class: "k", text: c.k }),
    h("div", { class: "v", text: c.v }),
  )));
  wrap.appendChild(identity);

  wrap.appendChild(h("div", { class: "block-head" },
    h("h3", { text: "Plan" }),
    h("div", { class: "kicker", text: "→ ACTIVE" }),
  ));
  const plan = h("div", { class: "block-spec", style: { "--spec-cols": "4", marginBottom: "24px" } });
  [
    { k: "Tier", v: TEND_DATA.account.plan },
    { k: "Price", v: TEND_DATA.account.price },
    { k: "Renews", v: TEND_DATA.account.renews },
    { k: "Seats", v: TEND_DATA.account.seats },
  ].forEach(c => plan.appendChild(h("div", { class: "cell" },
    h("div", { class: "k", text: c.k }),
    h("div", { class: "v", text: c.v }),
  )));
  wrap.appendChild(plan);

  wrap.appendChild(h("div", { class: "block-head" },
    h("h3", { text: "Usage" }),
    h("div", { class: "kicker", text: "→ THIS CYCLE" }),
  ));
  const usage = h("div", { class: "block-kpi", style: { marginBottom: "24px", "--kpi-cols": "3" } });
  [
    { k: "Storage", v: TEND_DATA.account.storage.used, delta: "of " + TEND_DATA.account.storage.quota },
    { k: "Support calls", v: TEND_DATA.account.supportCalls.used + "/" + TEND_DATA.account.supportCalls.included, delta: "included monthly" },
    { k: "Next invoice", v: TEND_DATA.account.nextInvoice.split(" · ")[1], delta: TEND_DATA.account.nextInvoice.split(" · ")[0] },
  ].forEach(it => usage.appendChild(h("div", { class: "cell" },
    h("div", { class: "k", text: it.k }),
    h("div", { class: "v", text: it.v }),
    it.delta ? h("div", { class: "delta", text: it.delta }) : null,
  )));
  wrap.appendChild(usage);

  wrap.appendChild(h("div", { class: "flex gap-8", style: { flexWrap: "wrap" } },
    h("button", { class: "btn primary", text: "EXPORT WORKSPACE ZIP", onclick: () => toast({ t: "EXPORT", m: "Full workspace zip queued. Email when ready.", tone: "pos" }) }),
    h("button", { class: "btn ghost", text: "MANAGE BILLING", onclick: () => toast({ t: "BILLING", m: "Opening Stripe customer portal (mock).", tone: "" }) }),
    h("button", { class: "btn ghost", text: "INVITE SEAT", onclick: () => toast({ t: "SOLO", m: "Solo is 1-seat. Upgrade to Business to add seats.", tone: "warn" }) }),
    h("button", { class: "btn ghost", text: "REQUEST SUPPORT CALL", onclick: () => toast({ t: "SUPPORT", m: "Calendly link sent. You have 1 of 2 calls remaining this cycle.", tone: "pos" }) }),
  ));

  return wrap;
}

/* ───── WELCOME OVERLAY ───── */
function renderWelcomeOverlay() {
  const overlay = h("div", { class: "welcome-overlay" });
  const card = h("div", { class: "welcome-card" });

  const steps = [
    {
      meta: "§ DAILY WELCOME · STEP 01 OF 03",
      title: "Pick today's focus.",
      sub: "I'll bias today's snapshot and which sessions surface to the top accordingly. You can switch any time.",
      options: [
        { id: "listings", icon: "→", t: "Listing pipeline", d: "Pre-launch, comps, vendor coordination" },
        { id: "clients", icon: "→", t: "Past clients", d: "Reactivation, anniversary, retention" },
        { id: "field", icon: "→", t: "Field day", d: "Showings, walkthroughs, on-the-go" },
        { id: "admin", icon: "→", t: "Admin & ops", d: "Approvals, vendor decisions, billing" },
      ],
      key: "focus",
    },
    {
      meta: "§ DAILY WELCOME · STEP 02 OF 03",
      title: "Energy check.",
      sub: "Honest answer is fine — I'll shorten the queue if you're tight on bandwidth.",
      options: [
        { id: "full", icon: "→", t: "Full bandwidth", d: "Bring me everything" },
        { id: "half", icon: "→", t: "Half day", d: "Only what needs me today" },
        { id: "thin", icon: "→", t: "Thin slice", d: "Just the decisions, nothing else" },
      ],
      key: "energy",
    },
    {
      meta: "§ DAILY WELCOME · STEP 03 OF 03",
      title: "Anything on your mind I should know?",
      sub: "Optional. Free-text. I'll factor it into how I prioritize today.",
      key: "context",
      free: true,
    },
  ];

  const step = steps[state.welcomeStep];
  card.appendChild(h("div", { class: "step-meta", text: step.meta }));
  card.appendChild(h("h2", { text: step.title }));
  card.appendChild(h("p", { class: "sub", text: step.sub }));

  if (step.free) {
    card.appendChild(h("textarea", {
      class: "free-input",
      placeholder: "e.g. nervous about the Tom Miller listing comp, want to think through pricing first…",
    }));
  } else {
    const opts = h("div", { class: "options" });
    for (const o of step.options) {
      const selected = state.welcomeAnswers[step.key] === o.id;
      opts.appendChild(h("button", {
        class: "option" + (selected ? " selected" : ""),
        onclick: () => {
          state.welcomeAnswers[step.key] = o.id;
          render();
        },
      },
        h("span", { class: "icon mono", text: o.icon }),
        h("div", {},
          h("div", { class: "t", text: o.t }),
          h("div", { class: "d", text: o.d }),
        ),
      ));
    }
    card.appendChild(opts);
  }

  const navRow = h("div", { class: "nav-row" });
  const pips = h("div", { class: "progress" });
  for (let i = 0; i < steps.length; i++) {
    pips.appendChild(h("div", { class: "pip" + (i <= state.welcomeStep ? " active" : "") }));
  }
  navRow.appendChild(pips);
  const navButtons = h("div", { class: "flex gap-8" });
  if (state.welcomeStep > 0) {
    navButtons.appendChild(h("button", {
      class: "btn ghost",
      text: "BACK",
      onclick: () => { state.welcomeStep--; render(); },
    }));
  }
  navButtons.appendChild(h("button", {
    class: "btn ghost",
    text: "SKIP",
    onclick: () => {
      state.welcomeShown = true;
      localStorage.setItem("tend.welcomeDone", new Date().toDateString());
      $(".welcome-overlay")?.remove();
    },
  }));
  if (state.welcomeStep < steps.length - 1) {
    navButtons.appendChild(h("button", {
      class: "btn primary",
      text: "NEXT →",
      onclick: () => { state.welcomeStep++; render(); },
    }));
  } else {
    navButtons.appendChild(h("button", {
      class: "btn primary",
      text: "BUILD MY DAY →",
      onclick: () => {
        // capture free-text if present
        const freeTa = card.querySelector(".free-input");
        if (freeTa) state.welcomeAnswers.context = freeTa.value;
        state.greetingFocus = state.welcomeAnswers.focus || null;
        state.welcomeShown = true;
        localStorage.setItem("tend.welcomeDone", new Date().toDateString());
        $(".welcome-overlay")?.remove();
        const focusName = ({ listings: "Listings", clients: "Past clients", field: "Field day", admin: "Admin & ops" })[state.greetingFocus] || "today";
        toast({ t: "DAY BUILT", m: `Snapshot biased for ${focusName}. ${state.welcomeAnswers.energy === "thin" ? "Queue trimmed." : "Full queue surfaced."}`, tone: "pos" });
        render();
      },
    }));
  }
  navRow.appendChild(navButtons);
  card.appendChild(navRow);

  overlay.appendChild(card);
  return overlay;
}

/* ════════════════════════════════════════════════════════════
   DRAG (column resizer)
   ════════════════════════════════════════════════════════════ */
function enableHorizontalDrag(container, handle, leftVar, rightVar, fixedLeft, onChange) {
  let dragging = false;
  let lastLeft = null, lastRight = null;
  handle.addEventListener("mousedown", (e) => {
    dragging = true;
    document.body.style.cursor = "col-resize";
    e.preventDefault();
  });
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const total = rect.width;
    const min = 280;
    const left = Math.max(min, Math.min(total - min - 6, x));
    lastLeft = left;
    if (fixedLeft != null) {
      container.style.setProperty(leftVar, left + "px");
    } else {
      const right = total - left - 6;
      lastRight = right;
      container.style.setProperty(leftVar, left + "px");
      if (rightVar) container.style.setProperty(rightVar, right + "px");
    }
  });
  document.addEventListener("mouseup", () => {
    if (dragging) {
      dragging = false;
      document.body.style.cursor = "";
      if (onChange && lastLeft != null) onChange(lastLeft, lastRight);
    }
  });
}
