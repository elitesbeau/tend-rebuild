<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tend · Riverbend Realty</title>
<meta name="description" content="Tend Solo — the operating brain for an autonomous business." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ════════════════════════════════════════════════════════════
   tend Solo · single-file rebuild · v1 (2026-05-18)
   Dark editorial-blueprint, gold accent, IBM Plex.
   Same IA + 10-block system as the prototype, tighter rhythm,
   mobile baseline, polished transitions.
   ════════════════════════════════════════════════════════════ */

/* DARK (default) */
:root, html[data-theme="dark"] {
  --bg:          #0A0B0D;
  --bg-2:        #101215;
  --bg-3:        #16191D;
  --bg-4:        #1A1E22;
  --line:        rgba(255,255,255,0.08);
  --line-2:      rgba(255,255,255,0.16);
  --line-hi:     rgba(255,255,255,0.28);
  --fg:          #ECE7DE;
  --fg-dim:      rgba(236,231,222,0.62);
  --fg-mute:     rgba(236,231,222,0.38);
  --fg-ghost:    rgba(236,231,222,0.18);
  --card-bg:     transparent;
  --card-bg-2:   rgba(255,255,255,0.018);
  --accent:      #D4A659;
  --accent-ink:  #14150F;
  --accent-soft: rgba(212,166,89,0.12);
  --accent-line: rgba(212,166,89,0.40);
  --positive:    #7BB290;
  --positive-soft: rgba(123,178,144,0.12);
  --warn:        #D4A659;
  --warn-soft:   rgba(212,166,89,0.10);
  --danger:      #D87359;
  --danger-soft: rgba(216,115,89,0.12);
  --sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
  --serif: 'Times New Roman', Georgia, serif;
}

/* LIGHT — cream + ink hairlines */
html[data-theme="light"] {
  --bg:          #ECEAE5;
  --bg-2:        #E6E3DC;
  --bg-3:        #DCD8CE;
  --bg-4:        #F4F2EC;
  --line:        rgba(26,26,24,0.07);
  --line-2:      rgba(26,26,24,0.16);
  --line-hi:     #1A1A18;
  --fg:          #1A1A18;
  --fg-dim:      rgba(26,26,24,0.62);
  --fg-mute:     rgba(26,26,24,0.46);
  --fg-ghost:    rgba(26,26,24,0.22);
  --card-bg:     transparent;
  --card-bg-2:   #F2F0EA;
  --accent:      #B5743A;
  --accent-ink:  #F4F2EC;
  --accent-soft: rgba(181,116,58,0.10);
  --accent-line: rgba(181,116,58,0.40);
  --positive:    #4A8762;
  --positive-soft: rgba(74,135,98,0.10);
  --warn:        #B5743A;
  --warn-soft:   rgba(181,116,58,0.10);
  --danger:      #A8442C;
  --danger-soft: rgba(168,68,44,0.10);
}

* { box-sizing: border-box; }
em, i, blockquote, cite, address { font-style: normal; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); }
body {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
input, textarea { font: inherit; color: inherit; outline: none; }

.mono { font-family: var(--mono); }
.serif {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0;
}

/* Scrollbar — slim */
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
*::-webkit-scrollbar-thumb:hover { background: var(--line-hi); }

/* ────────────────────────────────────────
   META STRIP — the §NN / NAME / DESC pattern
   ──────────────────────────────────────── */
.meta, .meta-strip {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  display: flex;
  align-items: center;
  gap: 12px;
}
.meta strong, .meta-strip strong { color: var(--fg); font-weight: 500; }
.meta em, .meta-strip em { color: var(--accent); font-style: normal; font-weight: 500; }
.meta .sep, .meta-strip .sep { color: var(--fg-ghost); }

.hair { height: 1px; background: var(--line); width: 100%; }

/* ────────────────────────────────────────
   APP SHELL
   ──────────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: 240px 1fr;
  height: 100vh;
  width: 100vw;
  background: var(--bg);
  transition: grid-template-columns 200ms cubic-bezier(0.4,0,0.2,1);
}
#app.collapsed { grid-template-columns: 56px 1fr; }

/* ────────────────────────────────────────
   SIDEBAR
   ──────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--line);
  background: transparent;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
html[data-theme="dark"] .sidebar { background: rgba(255,255,255,0.012); }

.sidebar-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  height: 56px;
  flex-shrink: 0;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.02em;
}
.brand .dot {
  width: 18px; height: 14px;
  flex-shrink: 0;
  background-image:
    linear-gradient(var(--fg), var(--fg)),
    linear-gradient(var(--fg), var(--fg)),
    linear-gradient(var(--fg), var(--fg));
  background-repeat: no-repeat;
  background-size: 100% 3px, 100% 3px, 35% 6px;
  background-position: 0 0, 0 5px, 50% 100%;
}
.collapse-btn {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: 0.06em;
  padding: 4px 8px;
  border: 1px solid var(--line);
  transition: color 150ms, border-color 150ms;
}
.collapse-btn:hover { color: var(--fg); border-color: var(--line-2); }
#app.collapsed .brand span:not(.dot) { display: none; }
#app.collapsed .collapse-btn { padding: 4px 6px; }

.sidebar-body { flex: 1; overflow-y: auto; padding: 12px 0; }

.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 10px 18px;
  color: var(--fg-dim);
  font-size: 13.5px;
  letter-spacing: -0.005em;
  border-left: 2px solid transparent;
  transition: color 120ms, background 120ms, border-color 120ms;
  text-align: left;
  line-height: 1.2;
}
.nav-btn:hover { color: var(--fg); background: rgba(255,255,255,0.025); }
html[data-theme="light"] .nav-btn:hover { background: rgba(26,26,24,0.04); }
.nav-btn.active {
  color: var(--fg);
  border-left-color: var(--accent);
  background: var(--accent-soft);
}
.nav-btn .icon {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-mute);
  width: 14px;
  text-align: center;
  flex-shrink: 0;
}
.nav-btn.active .icon { color: var(--accent); }
.nav-btn .badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  background: var(--accent);
  color: var(--accent-ink);
  padding: 2px 6px;
}
#app.collapsed .nav-btn span:not(.icon):not(.badge) { display: none; }
#app.collapsed .nav-btn { justify-content: center; padding: 10px 0; }
#app.collapsed .nav-btn .badge { display: none; }

/* nested sessions */
.nav-sub { padding: 4px 0 8px 32px; }
#app.collapsed .nav-sub { display: none; }
.nav-sub .nav-sub-head {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  padding: 6px 0 4px;
}
.nav-sub-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 6px 0 6px 12px;
  margin-left: -8px;
  color: var(--fg-dim);
  font-size: 12.5px;
  border-left: 1px solid var(--line);
  transition: color 120ms, border-color 120ms;
  text-align: left;
}
.nav-sub-item:hover { color: var(--fg); }
.nav-sub-item.active { color: var(--accent); border-left-color: var(--accent); }
.nav-sub-item .dot-tiny {
  width: 4px; height: 4px;
  background: var(--fg-mute);
  border-radius: 50%;
  flex-shrink: 0;
}
.nav-sub-item.active .dot-tiny { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* workspace footer */
.sidebar-foot {
  border-top: 1px solid var(--line);
  padding: 16px 18px 18px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--fg-mute);
  line-height: 1.5;
  flex-shrink: 0;
}
.sidebar-foot .ws-name {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 6px;
}
.sidebar-foot .ws-owner { color: var(--fg); margin-bottom: 2px; }
.sidebar-foot .ws-plan { color: var(--accent); white-space: nowrap; }
#app.collapsed .sidebar-foot { display: none; }

.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--fg-mute);
  padding: 5px 9px;
  border: 1px solid var(--line);
  margin-top: 10px;
  text-transform: uppercase;
  transition: color 150ms, border-color 150ms;
}
.theme-toggle:hover { color: var(--fg); border-color: var(--line-2); }
.theme-toggle .sw {
  width: 22px; height: 12px;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  position: relative;
  flex-shrink: 0;
}
.theme-toggle .sw::after {
  content: ""; position: absolute; top: 1px; width: 8px; height: 8px;
  background: var(--accent);
  transition: left 180ms ease;
  left: 1px;
}
html[data-theme="light"] .theme-toggle .sw::after { left: 11px; }

.restart-tour {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 6px 0;
  background: transparent;
  border: none;
  border-top: 1px solid var(--line);
  color: var(--fg-mute);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: left;
  cursor: pointer;
  transition: color 150ms;
}
.restart-tour:hover { color: var(--accent); }

/* ────────────────────────────────────────
   MAIN PANE
   ──────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100vh;
}

/* ────────────────────────────────────────
   BUTTONS
   ──────────────────────────────────────── */
.btn {
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.04em;
  padding: 8px 14px;
  color: var(--fg);
  border: 1px solid var(--line-2);
  transition: all 150ms;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { border-color: var(--fg-dim); }
.btn.primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
}
.btn.primary:hover { filter: brightness(1.08); }
.btn.ghost { border-color: var(--line); color: var(--fg-dim); }
.btn.ghost:hover { color: var(--fg); border-color: var(--line-2); }
.btn.reject { border-color: var(--danger); color: var(--danger); }
.btn.reject:hover { background: var(--danger-soft); }

.btn-mini {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  padding: 5px 10px;
  color: var(--fg-dim);
  border: 1px solid var(--line);
  transition: color 150ms, border-color 150ms;
}
.btn-mini:hover { color: var(--fg); border-color: var(--line-2); }
.btn-mini.primary {
  background: var(--accent);
  color: var(--accent-ink);
  border-color: var(--accent);
}
.btn-mini.ghost { background: transparent; }

/* Pills */
.pill {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--line-2);
  color: var(--fg-dim);
}
.pill.accent { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
.pill.warn { color: var(--warn); border-color: var(--accent-line); background: var(--warn-soft); }
.pill.pos { color: var(--positive); border-color: var(--positive); background: var(--positive-soft); }
.pill.danger { color: var(--danger); border-color: var(--danger); background: var(--danger-soft); }

/* ────────────────────────────────────────
   PAGE-LEVEL TYPE
   ──────────────────────────────────────── */
.section-title {
  font-family: var(--sans);
  font-weight: 300;
  letter-spacing: -0.025em;
  line-height: 1.12;
  font-size: 40px;
  margin: 14px 0 6px;
  text-wrap: pretty;
}
.section-sub {
  font-size: 13.5px;
  color: var(--fg-mute);
  max-width: 62ch;
  line-height: 1.55;
  margin: 0 0 28px;
}

/* ────────────────────────────────────────
   CHAT PAGE — chat-left + surface-right
   ──────────────────────────────────────── */
.chat-page {
  display: grid;
  grid-template-columns: var(--chat-w, 1fr) 6px var(--surface-w, 1fr);
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
.chat-page.solo { grid-template-columns: 1fr; }

.chat-pane {
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 280px;
}
.chat-page.solo .chat-pane { border-right: none; }

.chat-head {
  padding: 14px 22px 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  flex-shrink: 0;
}
.chat-head .session-meta { display: flex; flex-direction: column; gap: 4px; }
.chat-head .session-title { font-size: 15px; font-weight: 500; }
.chat-head .session-sub {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  color: var(--fg-mute);
  text-transform: uppercase;
}

.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.msg { max-width: 78%; font-size: 14px; line-height: 1.55; }
.msg .who {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 6px;
}
.msg.user { align-self: flex-end; text-align: right; }
.msg.user .who { color: var(--accent); }
.msg .bubble {
  padding: 11px 14px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--fg);
  white-space: pre-wrap;
}
.msg.user .bubble {
  background: var(--accent-soft);
  border-color: var(--accent-line);
}

.chat-input {
  border-top: 1px solid var(--line);
  padding: 12px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  background: var(--bg);
}
.chat-input textarea {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--fg);
  padding: 10px 12px;
  font-family: var(--sans);
  font-size: 13.5px;
  resize: none;
  min-height: 38px;
  max-height: 100px;
}
.chat-input textarea:focus { border-color: var(--line-2); }
.chat-input .send {
  background: var(--accent);
  color: var(--accent-ink);
  padding: 9px 14px;
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.04em;
  transition: filter 150ms;
}
.chat-input .send:hover { filter: brightness(1.08); }

/* Divider drag handle */
.divider {
  cursor: col-resize;
  background: transparent;
  position: relative;
  user-select: none;
}
.divider::before {
  content: "";
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: var(--line);
  transform: translateX(-0.5px);
}
.divider:hover::before { background: var(--line-2); }
.divider::after {
  content: "";
  position: absolute;
  left: 50%; top: 50%;
  width: 2px; height: 32px;
  background: var(--line-hi);
  transform: translate(-50%,-50%);
  opacity: 0;
  transition: opacity 150ms;
}
.divider:hover::after { opacity: 1; }

/* ────────────────────────────────────────
   OPERATING SURFACE
   ──────────────────────────────────────── */
.surface {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 300px;
}
.surface-head {
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: stretch;
  height: 56px;
  flex-shrink: 0;
}
.surface-tabs { display: flex; align-items: stretch; overflow-x: auto; }
.surface-tab {
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: var(--fg-mute);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-right: 1px solid var(--line);
  position: relative;
  transition: color 150ms, background 150ms;
  white-space: nowrap;
}
.surface-tab:hover { color: var(--fg-dim); }
.surface-tab.active {
  color: var(--fg);
  background: var(--bg-2);
}
html[data-theme="light"] .surface-tab.active { background: transparent; }
.surface-tab.active::after {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--accent);
}
.surface-tab .tab-count {
  margin-left: 7px;
  color: var(--fg-mute);
  font-size: 10px;
}
.surface-head .right {
  margin-left: auto;
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 8px;
}
.surface-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px 28px 32px;
  background: var(--bg);
}
.surface-meta {
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

/* surface footer · live sync indicator */
.surface-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 28px;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--fg-mute);
}
.surface-foot .sync { color: var(--accent); display: flex; align-items: center; gap: 8px; }
.surface-foot .sync .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-soft); }
  50% { opacity: 0.55; box-shadow: 0 0 0 4px var(--accent-soft); }
}

/* ────────────────────────────────────────
   BLOCK PRIMITIVES
   ──────────────────────────────────────── */
.block { margin-bottom: 26px; }
.block:last-child { margin-bottom: 0; }
.block-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.block-head h3 {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  margin: 0;
}
.block-head .kicker {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}

/* doc */
.block-doc { color: var(--fg-dim); font-size: 14px; line-height: 1.65; }
.block-doc h1, .block-doc h2, .block-doc h3 { color: var(--fg); font-weight: 500; letter-spacing: -0.01em; margin: 18px 0 8px; }
.block-doc h1 { font-size: 22px; margin-top: 0; }
.block-doc h2 { font-size: 17px; }
.block-doc h3 { font-size: 13px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-mute); font-weight: 500; }
.block-doc p { margin: 0 0 10px; }
.block-doc ul { margin: 0 0 12px; padding-left: 18px; }
.block-doc li { margin-bottom: 4px; }
.block-doc code { font-family: var(--mono); font-size: 12.5px; color: var(--accent); background: rgba(212,166,89,0.07); padding: 1px 5px; }
.block-doc strong { color: var(--fg); font-weight: 500; }

/* kpi */
.block-kpi {
  display: grid;
  grid-template-columns: repeat(var(--kpi-cols, 4), 1fr);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.block-kpi .cell {
  padding: 22px 24px;
  border-right: 1px solid var(--line);
}
.block-kpi .cell:last-child { border-right: none; }
.block-kpi .cell .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 10px;
}
.block-kpi .cell .v {
  font-family: var(--sans);
  font-weight: 300;
  font-size: 32px;
  letter-spacing: -0.025em;
  line-height: 1;
  color: var(--fg);
}
.block-kpi .cell .v .unit { font-size: 16px; color: var(--fg-mute); margin-left: 4px; font-weight: 400; }
.block-kpi .cell .delta {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  margin-top: 8px;
  color: var(--fg-mute);
}
.block-kpi .cell .delta.pos { color: var(--positive); }
.block-kpi .cell .delta.warn { color: var(--warn); }

/* spec */
.block-spec {
  display: grid;
  grid-template-columns: repeat(var(--spec-cols, 3), 1fr);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.block-spec .cell {
  padding: 16px 20px;
  border-right: 1px solid var(--line);
  font-family: var(--mono);
}
.block-spec .cell:last-child { border-right: none; }
.block-spec .cell .k {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 6px;
}
.block-spec .cell .v { font-size: 13px; color: var(--fg); }
.block-spec .cell.is-edit { position: relative; cursor: pointer; transition: background 150ms; }
.block-spec .cell.is-edit:hover { background: var(--bg-2); }
.block-spec .cell .pencil {
  position: absolute; top: 10px; right: 12px;
  font-size: 11px; color: var(--accent); opacity: 0.7;
}

/* matrix */
.block-matrix {
  display: grid;
  grid-template-columns: repeat(var(--matrix-cols, 3), 1fr);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.block-matrix .cell {
  padding: 22px 22px 18px;
  border-right: 1px solid var(--line);
  min-height: 140px;
}
.block-matrix.cols-3 .cell:nth-child(3n) { border-right: none; }
.block-matrix.cols-2 .cell:nth-child(2n) { border-right: none; }
.block-matrix .cell .num {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  color: var(--fg-mute);
  margin-bottom: 12px;
}
.block-matrix .cell h4 {
  font-size: 15px;
  font-weight: 500;
  margin: 0 0 6px;
  letter-spacing: -0.005em;
  line-height: 1.3;
}
.block-matrix .cell p {
  font-size: 12.5px;
  color: var(--fg-dim);
  line-height: 1.55;
  margin: 0;
}
.block-matrix .cell .foot {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-mute);
}
.block-matrix .cell .foot .foot-label { color: var(--accent); flex: 1; }
.block-matrix .cell .foot .foot-time { color: var(--fg-mute); }

/* table */
.block-table {
  width: 100%;
  border-collapse: collapse;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.block-table th, .block-table td {
  text-align: left;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}
.block-table th {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-mute);
  font-weight: 500;
  background: var(--bg-2);
}
html[data-theme="light"] .block-table th { background: var(--card-bg-2); }
.block-table tbody tr:last-child td { border-bottom: none; }
.block-table tbody tr:hover td { background: var(--bg-2); }
html[data-theme="light"] .block-table tbody tr:hover td { background: var(--card-bg-2); }

/* code */
.block-code {
  background: #06070A;
  border: 1px solid var(--line);
  padding: 18px 20px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  color: var(--fg-dim);
  overflow-x: auto;
}
html[data-theme="light"] .block-code { background: var(--bg-2); color: var(--fg); }

/* approval */
.block-approval {
  border: 1px solid var(--accent-line);
  border-left-width: 3px;
  background: var(--accent-soft);
  padding: 18px 20px;
}
.block-approval .head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.block-approval .head .label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
}
.block-approval h4 {
  font-size: 15px;
  font-weight: 500;
  margin: 0 0 6px;
  letter-spacing: -0.005em;
}
.block-approval p {
  font-size: 13px;
  color: var(--fg-dim);
  line-height: 1.55;
  margin: 0 0 14px;
}
.block-approval .actions { display: flex; gap: 8px; flex-wrap: wrap; }
.block-approval .actions .btn { font-size: 11px; padding: 7px 14px; }

/* checklist */
.block-checklist {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 6px 20px;
}
.block-checklist .item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13.5px;
}
.block-checklist .item:last-child { border-bottom: none; }
.block-checklist .item .check {
  width: 14px; height: 14px;
  border: 1px solid var(--line-2);
  flex-shrink: 0;
  margin-top: 2px;
}
.block-checklist .item.done .check {
  background: var(--accent);
  border-color: var(--accent);
  position: relative;
}
.block-checklist .item.done .check::after {
  content: "✓"; color: var(--accent-ink); font-size: 11px;
  position: absolute; inset: 0; line-height: 12px; text-align: center;
}
.block-checklist .item.done .label { color: var(--fg-mute); text-decoration: line-through; }
.block-checklist .item .label { color: var(--fg); }
.block-checklist .item .meta {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--fg-mute);
  letter-spacing: 0.04em;
}

/* approvals summary card */
.block-approvals-summary {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  border-left: 2px solid var(--accent);
  padding: 0;
}
.block-approvals-summary .block-head {
  padding: 16px 18px 12px;
  margin-bottom: 0;
}
.block-approvals-summary .block-head h3 { font-size: 15px; }
.block-approvals-summary .kicker.link {
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--accent);
  padding: 0 2px;
  transition: text-decoration 150ms;
}
.block-approvals-summary .kicker.link:hover { text-decoration: underline; }
.approvals-summary-list { display: flex; flex-direction: column; }
.as-row {
  text-align: left;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  background: transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  color: var(--fg);
  transition: background 150ms;
}
.as-row:hover { background: var(--bg-2); }
html[data-theme="light"] .as-row:hover { background: var(--card-bg-2); }
.as-row.prio-high { border-left: 2px solid var(--accent); }
.as-title { font-size: 13px; font-weight: 500; line-height: 1.35; }
.as-meta { font-size: 10.5px; color: var(--fg-mute); font-family: var(--mono); letter-spacing: 0.04em; }
.as-meta .sep { margin: 0 5px; opacity: 0.5; }
.summary-more {
  display: block;
  width: 100%;
  text-align: center;
  padding: 12px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  background: transparent;
  border: none;
  border-top: 1px solid var(--line);
  cursor: pointer;
  transition: background 150ms;
}
.summary-more:hover { background: var(--bg-2); }
html[data-theme="light"] .summary-more:hover { background: var(--card-bg-2); }

/* outputs feed */
.block-outputs-feed {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.block-outputs-feed .block-head { padding: 14px 18px 10px; margin-bottom: 0; }
.outputs-list { display: flex; flex-direction: column; }
.output-row {
  display: grid;
  grid-template-columns: 95px 1.1fr 1.4fr 1.4fr;
  gap: 14px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  align-items: baseline;
}
.output-row:last-child { border-bottom: none; }
.or-when { font-family: var(--mono); font-size: 10.5px; color: var(--fg-mute); letter-spacing: 0.04em; }
.or-from { font-weight: 500; }
.or-what { color: var(--fg-dim); }
.or-where {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--accent);
  white-space: normal;
  line-height: 1.4;
  word-break: break-word;
}
.output-row.kind-approval .or-where { color: var(--warn); }
.output-row.kind-email .or-where { color: var(--positive); }

/* ────────────────────────────────────────
   DATA LAYER PAGE
   ──────────────────────────────────────── */
.data-page {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.connectors-bar {
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 10px 24px;
  gap: 10px;
  height: 56px;
  flex-shrink: 0;
  overflow-x: auto;
}
.connectors-bar .label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-right: 6px;
  flex-shrink: 0;
}
.connector-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg-dim);
  letter-spacing: 0.02em;
  white-space: nowrap;
  transition: color 150ms, border-color 150ms;
  flex-shrink: 0;
}
.connector-chip:hover { color: var(--fg); border-color: var(--line-2); }
.connector-chip .status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--positive);
  box-shadow: 0 0 0 2px var(--positive-soft);
  flex-shrink: 0;
}
.connector-chip.off { color: var(--fg-mute); }
.connector-chip.off .status-dot { background: var(--fg-ghost); box-shadow: none; }
.connector-chip.add { color: var(--accent); border-color: var(--accent-line); border-style: dashed; cursor: pointer; }

.data-body {
  flex: 1;
  display: grid;
  grid-template-columns: var(--data-chat-w, 380px) 6px 1fr;
  overflow: hidden;
  min-height: 0;
}
.data-md {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.data-md-head {
  border-bottom: 1px solid var(--line);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  flex-shrink: 0;
  gap: 12px;
}
.data-md-tabs { display: flex; gap: 0; flex: 1; overflow-x: auto; min-width: 0; }
.md-tab {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 6px 12px;
  color: var(--fg-mute);
  border: 1px solid var(--line);
  border-right: none;
  white-space: nowrap;
  transition: color 150ms, background 150ms;
}
.md-tab:last-child { border-right: 1px solid var(--line); }
.md-tab:hover { color: var(--fg-dim); }
.md-tab.active { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
.data-md-body {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px 40px;
  max-width: 920px;
}
.data-md-body .file-meta {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 22px;
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
}
.data-md-body .file-meta strong { color: var(--accent); font-weight: 500; }

/* ────────────────────────────────────────
   AUTOMATIONS PAGE
   ──────────────────────────────────────── */
.automations-page { flex: 1; overflow-y: auto; padding: 32px 40px 60px; }
.automations-page .meta-strip { padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 6px; }
.automations-page h2.section-title { font-size: 36px; line-height: 1.15; }

.auto-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-top: 24px;
}
.auto-tab {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 12px 18px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  color: var(--fg-mute);
  margin-bottom: -1px;
  transition: color 150ms, border-color 150ms;
}
.auto-tab .lbl {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.auto-tab .cnt {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--fg-mute);
  background: var(--bg-3);
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
}
.auto-tab.tone-warn .cnt { background: var(--warn-soft); color: var(--warn); }
.auto-tab:hover { color: var(--fg); }
.auto-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
.auto-tab.active .cnt { background: var(--accent-soft); color: var(--accent); }

.auto-page-body {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 28px;
  margin-top: 24px;
  align-items: start;
}
.auto-left { min-width: 0; }

.auto-list { display: flex; flex-direction: column; }
.auto-row {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.6fr 1.2fr auto;
  gap: 16px;
  padding: 18px 20px;
  background: transparent;
  border: 1px solid var(--line);
  border-bottom: none;
  text-align: left;
  cursor: pointer;
  align-items: center;
  color: inherit;
  transition: background 150ms;
}
.auto-row:last-child { border-bottom: 1px solid var(--line); }
.auto-row:hover { background: var(--bg-2); }
html[data-theme="light"] .auto-row:hover { background: var(--card-bg-2); }
.auto-row .name .t { font-weight: 500; font-size: 14px; }
.auto-row .name .d { font-size: 12px; color: var(--fg-mute); margin-top: 3px; }
.auto-row .k {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 4px;
}
.auto-row .schedule, .auto-row .next, .auto-row .output { font-size: 12px; font-family: var(--mono); color: var(--fg-dim); letter-spacing: 0.02em; }
.auto-row .output .v { font-size: 12px; line-height: 1.4; font-family: var(--sans); color: var(--fg); }
.auto-row .output .where { font-size: 10.5px; color: var(--accent); margin-top: 3px; font-family: var(--mono); }

.auto-new {
  margin-top: 12px;
  width: 100%;
  padding: 14px 18px;
  background: transparent;
  border: 1px dashed var(--line-2);
  text-align: left;
  color: var(--fg-mute);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 150ms, border-color 150ms;
}
.auto-new:hover { border-color: var(--accent-line); color: var(--accent); }
.auto-new .plus { font-size: 18px; line-height: 1; }

/* automation detail */
.seq-map {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 0;
  margin-top: 16px;
  display: grid;
}
.seq-step {
  position: relative;
  padding: 18px 18px;
  border-right: 1px solid var(--line);
}
.seq-step:last-child { border-right: none; }
.seq-step .n {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.seq-step .t { font-size: 13px; color: var(--fg); margin-bottom: 4px; font-weight: 500; }
.seq-step .sub { font-size: 11.5px; color: var(--fg-mute); line-height: 1.4; }
.seq-step.gate { border-top: 2px solid var(--warn); }
.seq-step.gate .n { color: var(--warn); }

.block-output {
  border: 1px solid var(--accent-line);
  border-left: 3px solid var(--accent);
  padding: 18px 20px;
  margin-top: 12px;
  background: var(--accent-soft);
}
.block-output .produces { margin-bottom: 14px; }
.block-output .produces .lbl {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 4px;
}
.block-output .produces .val { font-size: 14px; font-weight: 500; }
.output-spec {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}
.output-spec .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 3px;
}
.output-spec .v { font-size: 12.5px; }

/* Keeper panel */
.keeper-panel {
  border: 1px solid var(--line);
  background: var(--card-bg-2);
  padding: 22px;
  position: sticky;
  top: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
html[data-theme="light"] .keeper-panel { background: transparent; }
.keeper-panel .meta { font-size: 10px; }
.keeper-title { font-weight: 500; font-size: 15px; margin-top: 4px; }
.keeper-sub { font-size: 12.5px; color: var(--fg-mute); line-height: 1.5; margin: 0; }
.keeper-suggest { display: flex; flex-direction: column; gap: 8px; }
.keeper-chip {
  text-align: left;
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.4;
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--fg);
  cursor: pointer;
  transition: color 150ms, border-color 150ms;
}
.keeper-chip:hover { border-color: var(--accent-line); color: var(--accent); }
.keeper-chat { border-top: 1px solid var(--line); padding-top: 14px; }
.k-msg { margin-bottom: 8px; }
.k-from {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.k-bubble {
  font-size: 12.5px;
  line-height: 1.55;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--line);
}
.keeper-input {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}
.keeper-input textarea {
  font-size: 12.5px;
  resize: none;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--line);
  color: var(--fg);
  min-height: 38px;
}
.keeper-input textarea:focus { border-color: var(--accent-line); }
.send-mini {
  background: var(--accent);
  color: var(--accent-ink);
  padding: 0 14px;
  font-weight: 600;
  min-width: 48px;
  transition: filter 150ms;
}
.send-mini:hover { filter: brightness(1.08); }

/* approvals inbox · full */
.approvals-inbox-full,
.outputs-log-full {
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  margin-top: 16px;
}
.approvals-inbox-full .approval-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
}
.approvals-inbox-full .approval-row:last-child { border-bottom: none; }
.approvals-inbox-full .approval-row.prio-high { border-left: 2px solid var(--accent); }
.ar-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-mute);
}
.ar-meta .from { color: var(--accent); }
.ar-title { font-weight: 500; font-size: 14px; }
.ar-preview { font-size: 12.5px; color: var(--fg-dim); line-height: 1.55; }
.ar-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 6px;
  flex-wrap: wrap;

## Tone
Warm, direct, locally rooted. Sound like a neighbor who happens to be a broker, not a salesperson. Confident but not slick. We write like we talk.

- Use first names with past clients
- Reference specific neighborhood details ("the trail behind Patterson Park")
- Be plain about numbers — never sugarcoat a hard comp
- Ask one clear question per message
- Sign off "— Sarah"

## Don't
- Use "luxury," "stunning," "must-see," "won't last"
- Use exclamation points (except in celebration messages)
- Use jargon without translating it
- Sign off "Best regards" or "Warm regards"

## Banned words
luxury, stunning, must-see, won't last, motivated seller, hidden gem, charming` },

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const h = (tag, attrs = {}, ...kids) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (v === false || v == null) continue;
    if (k === "class") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else if (k === "text") el.textContent = v;
    else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2), v);
    else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  }
  for (const kid of kids.flat()) {
    if (kid == null || kid === false) continue;
    el.appendChild(typeof kid === "string" ? document.createTextNode(kid) : kid);
  }
  return el;
};
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

/* minimal markdown */
function md(text) {
  if (!text) return "";
  const lines = text.split("\n");
  let out = [], inList = false, inCode = false;
  const flush = () => { if (inList) { out.push("</ul>"); inList = false; } };
  for (let raw of lines) {
    if (raw.trim().startsWith("```")) { flush(); inCode = !inCode; out.push(inCode ? "<pre><code>" : "</code></pre>"); continue; }
    if (inCode) { out.push(esc(raw)); continue; }
    let line = raw;
    if (/^### /.test(line)) { flush(); out.push("<h3>" + esc(line.slice(4)) + "</h3>"); continue; }
    if (/^## /.test(line)) { flush(); out.push("<h2>" + esc(line.slice(3)) + "</h2>"); continue; }
    if (/^# /.test(line)) { flush(); out.push("<h1>" + esc(line.slice(2)) + "</h1>"); continue; }
    if (/^[-*] /.test(line)) {
      if (!inList) { out.push("<ul>"); inList = true; }
      out.push("<li>" + inline(line.replace(/^[-*] /, "")) + "</li>");
      continue;
    }
    flush();
    if (line.trim() === "") { out.push(""); continue; }
    out.push("<p>" + inline(line) + "</p>");
  }
  flush();
  return out.join("\n");
}
function inline(s) {
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`([^`]+?)`/g, "<code>$1</code>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
}

/* ─── TOAST ─── */
function toast({ t = "TEND", m = "", tone = "" } = {}) {
  const id = ++state.toastSeq;
  state.toasts.push({ id, t, m, tone });
  renderToasts();
  setTimeout(() => dismissToast(id), 4500);
}
function dismissToast(id) {
  const el = document.querySelector(`.toast[data-id="${id}"]`);
  if (el) {
    el.classList.add("out");
    setTimeout(() => {
      state.toasts = state.toasts.filter(x => x.id !== id);
      renderToasts();
    }, 220);
  } else {
    state.toasts = state.toasts.filter(x => x.id !== id);
    renderToasts();
  }
}
function renderToasts() {
  let c = document.querySelector(".toast-container");
  if (!c) {
    c = h("div", { class: "toast-container" });
    document.body.appendChild(c);
  }
  c.innerHTML = "";
  for (const tn of state.toasts) {
    c.appendChild(h("div", { class: "toast " + (tn.tone || ""), "data-id": tn.id },
      h("div", {},
        h("span", { class: "t", text: tn.t }),
        h("div", { class: "m", text: tn.m }),
      ),
      h("button", { class: "x", text: "×", onclick: () => dismissToast(tn.id) }),
    ));
  }
}

/* ─── CHAT ─── */
function allMessages(session) {
  return session.messages.concat(state.userMessages[session.id] || []);
}
function nowStamp() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + ":" + String(m).padStart(2, "0") + " " + ampm;
}
function sendChat(sessionId, text) {
  text = text.trim();
  if (!text) return;
  const session = TEND_DATA.sessions.find(s => s.id === sessionId);
  if (!session) return;
  state.userMessages[sessionId] = state.userMessages[sessionId] || [];
  state.userMessages[sessionId].push({ role: "user", time: nowStamp(), text });

  // /op command spawns a new operations session
  const opMatch = text.match(/^\/op\s+(.+)/i);
  if (opMatch) {
    spawnSession(opMatch[1]);
    render();
    return;
  }

  // simulate agent thinking + reply
  state.typingSession = sessionId;
  render();
  setTimeout(() => {
    state.typingSession = null;
    state.userMessages[sessionId].push({
      role: "agent",
      time: nowStamp(),
      text: cannedReply(text, session),
    });
    render();
  }, 900 + Math.random() * 700);
}
function cannedReply(text, session) {
  const t = text.toLowerCase();
  if (/^\/op\s/.test(text)) return "Spawning a new operations session…";
  if (/price|comp|comps/.test(t)) return "Looking at the comp set. The $629–648K band still holds for the Tom Miller pricing — finishes-adjusted comps from the East Austin scan support $639K as the cleanest call. I'll surface a sensitivity matrix on the Pricing tab if you want to see the upside/downside cases.";
  if (/show|see|view/.test(t)) return "Surfacing it on the operating surface to the right. Switch tabs to drill in.";
  if (/send|approve|book/.test(t)) return "Held for your approval. The action is queued in the Approvals tab — release it when you're ready or counter and I'll re-draft.";
  if (/hold|pause|wait/.test(t)) return "Holding. Let me know when you want me to move on it.";
  if (/thanks|thank you|cool|nice|sounds good/.test(t)) return "Anytime.";
  if (session.kind === "general") return "Got it. I'll keep this on the radar. Want me to spawn a session for it? Type `/op <name>` and I'll open a dedicated room.";
  return "On it. I'll surface the results to the operating surface once I have them.";
}
function spawnSession(name) {
  const id = "ops-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-").slice(0, 20) + "-" + uid().slice(0, 4);
  const session = {
    id, kind: "operations",
    title: name,
    sub: "freshly spawned · empty room",
    lastActive: "just now",
    messages: [
      { role: "agent", time: nowStamp(), text: `New session. Opened **${name}**. The room is empty — tell me what you want to drive here.` },
    ],
    surfaces: [],
  };
  TEND_DATA.sessions.push(session);
  state.sessionId = id;
  state.surfaceTab = 0;
  state.newSessionId = id;
  setTimeout(() => { state.newSessionId = null; }, 1300);
  toast({ t: "SESSION SPAWNED", m: `Operations room "${name}" is open. Use chat to drive it.`, tone: "pos" });
}

  if (ta) { ta.value = text; ta.focus(); }
  if (el) {
    el.classList.add("flash");
    setTimeout(() => el.classList.remove("flash"), 480);
  }
}
function keeperSend(text) {
  if (!text || !text.trim()) return;
  toast({ t: "KEEPER", m: `Working: "${text.slice(0, 60)}${text.length > 60 ? "…" : ""}"`, tone: "pos" });
}

/* ─── DATA LAYER ─── */
function startEditFile() {
  state.editingFile = state.dataFile;
  state.fileBuffer[state.dataFile] = TEND_DATA.dataLayer[state.dataFile].content;
  render();
}
function saveEditFile() {
  const f = state.dataFile;
  if (state.fileBuffer[f] != null) {
    TEND_DATA.dataLayer[f].content = state.fileBuffer[f];
    TEND_DATA.dataLayer[f].updated = "just now";
    state.dirtyFiles.add(f);
    toast({ t: "SAVED", m: `${f} updated. Librarian will run coverage check.`, tone: "pos" });
  }
  state.editingFile = null;
  render();
}
function cancelEditFile() {
  state.editingFile = null;
  delete state.fileBuffer[state.dataFile];
  render();
}

/* ─── HISTORY STRIP ─── */
function viewHistoryDay(label) {
  if (label === "MAY 17") {
    state.viewingDay = null;
  } else {
    state.viewingDay = label;
    toast({ t: "SNAPSHOT", m: `Viewing the snapshot from ${label}. Click "Return to today" to come back.`, tone: "warn" });
  }
  render();
}

/* ─── CHAT INPUT WIRING (Enter to send) ─── */
function wireChatInput(textarea, sendButton, sessionId) {
  if (!textarea) return;
  const fire = () => {
    const v = textarea.value;
    textarea.value = "";
    sendChat(sessionId, v);
  };
  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      fire();
    }
  });
  if (sendButton) sendButton.addEventListener("click", fire);
}

/* ─── KEEPER INPUT WIRING ─── */
function wireKeeperInput(textarea, sendButton) {
  if (!textarea) return;
  const fire = () => {
    const v = textarea.value;
    textarea.value = "";
    keeperSend(v);
  };
  textarea.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      fire();
    }
  });
  if (sendButton) sendButton.addEventListener("click", fire);
}


function go(patch) {
  Object.assign(state, patch);
  render();
}

/* ════════════════════════════════════════════════════════════
   RENDER ROOT
   ════════════════════════════════════════════════════════════ */
function render() {
  document.documentElement.setAttribute("data-theme", state.theme);
  const root = $("#app");
  root.className = state.sidebarCollapsed ? "collapsed" : "";
  root.innerHTML = "";
  root.appendChild(renderSidebar());
  root.appendChild(renderMain());

  // welcome overlay only on first dashboard visit per day
  const existing = $(".welcome-overlay");
  if (existing) existing.remove();
  if (state.page === "dashboard" && !state.welcomeShown) {
    document.body.appendChild(renderWelcomeOverlay());
  }
  renderToasts();
}

function subItem(s) {

  const isNew = state.newSessionId === s.id;
  return h("button", {
    class: "nav-sub-item" + (active ? " active" : "") + (isNew ? " new" : ""),
    onclick: () => go({ sessionId: s.id, surfaceTab: 0 }),

    h("span", { class: "dot-tiny" }),
    h("span", { text: s.title }),
  );
}

   MAIN
   ════════════════════════════════════════════════════════════ */
function renderMain() {
  const main = h("section", { class: "main" });

    case "chat": main.appendChild(renderChat()); break;
